<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0f0d1a;font-family:'Inter',sans-serif;color:#f0eaff;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    letter-spacing:-0.8px;overflow:hidden;
  }

  .scene{position:relative;width:520px;height:520px}

  /* SVG ring */
  svg.ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:#1e1b2e;stroke-width:10}
  .ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:10;stroke-linecap:round;
    transition:stroke-dashoffset .4s linear;
    stroke-dasharray:1492;stroke-dashoffset:0}

  /* Circle card */
  .circle{
    position:absolute;inset:28px;
    border-radius:50%;
    background:#141122;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0;
  }

  /* Badge */
  .badge{
    font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:#7c3aed;margin-bottom:.5rem;
  }

  /* Time display */
  .time-row{display:flex;align-items:center;gap:2px;margin-bottom:.25rem}
  .time-box{display:flex;flex-direction:column;align-items:center}
  .time-box input{
    background:none;border:none;outline:none;
    font-family:'Inter',sans-serif;font-size:72px;font-weight:900;
    letter-spacing:-5px;color:#f0eaff;line-height:1;
    width:120px;text-align:center;
    -moz-appearance:textfield;cursor:text;
  }
  .time-box input::-webkit-inner-spin-button,
  .time-box input::-webkit-outer-spin-button{-webkit-appearance:none}
  .time-box input::placeholder{color:#2a2040}
  .time-box input:disabled{color:#f0eaff;cursor:default}
  .time-box .lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4b3f8a;margin-top:.1rem}
  .sep{font-size:64px;font-weight:900;color:#2e2550;letter-spacing:-5px;padding-bottom:10px;margin:0 -4px}

  /* Status */
  .status{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#5b4fa0;margin-bottom:1.1rem;min-height:14px}

  /* Buttons */
  .controls{display:flex;gap:.7rem;align-items:center}
  button.ctrl{
    border:none;outline:none;cursor:pointer;
    border-radius:50px;font-family:'Inter',sans-serif;
    font-weight:700;letter-spacing:-0.5px;
    transition:filter .15s,transform .1s;
  }
  button.ctrl:active{transform:scale(.94)}
  .btn-secondary{
    background:#1e1b2e;border:1px solid #2e2550;color:#c4b5fd;
    font-size:12px;padding:.55rem 1rem;
  }
  .btn-secondary:hover{filter:brightness(1.35)}
  .btn-primary{
    background:linear-gradient(135deg,#6d28d9,#4c1d95);
    border:1px solid #7c3aed;color:#fff;
    font-size:15px;padding:.7rem 1.6rem;
  }
  .btn-primary:hover{filter:brightness(1.15)}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .done-pulse input{animation:pulse .65s ease-in-out infinite;color:#a78bfa !important}
</style>
</head>
<body>
<div class="scene">

  <!-- SVG ring -->
  <svg class="ring" viewBox="0 0 520 520">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#a78bfa"/>
        <stop offset="100%" stop-color="#6d28d9"/>
      </linearGradient>
    </defs>
    <circle class="ring-bg" cx="260" cy="260" r="237"/>
    <circle class="ring-fill" id="ringFill" cx="260" cy="260" r="237"/>
  </svg>

  <!-- Inner circle -->
  <div class="circle">
    <div class="badge">Focus Timer</div>

    <div class="time-row">
      <div class="time-box" id="boxH">
        <input id="inH" type="number" min="0" max="23" placeholder="00" oninput="clampInput(this,23)"/>
        <div class="lbl">hours</div>
      </div>
      <div class="sep">:</div>
      <div class="time-box" id="boxM">
        <input id="inM" type="number" min="0" max="59" placeholder="00" oninput="clampInput(this,59)"/>
        <div class="lbl">min</div>
      </div>
      <div class="sep">:</div>
      <div class="time-box" id="boxS">
        <input id="inS" type="number" min="0" max="59" placeholder="00" oninput="clampInput(this,59)"/>
        <div class="lbl">sec</div>
      </div>
    </div>

    <div class="status" id="statusLbl">ready</div>

    <div class="controls">
      <button class="ctrl btn-secondary" onclick="resetTimer()">Reset</button>
      <button class="ctrl btn-primary" id="startBtn" onclick="toggleTimer()">▶ Start</button>
      <button class="ctrl btn-secondary" onclick="addTime(60)">+1 min</button>
    </div>
  </div>
</div>

<script>
  let total=0,remaining=0,running=false,interval=null,done=false;
  const pad=n=>String(n).padStart(2,"0");
  const inH=document.getElementById("inH");
  const inM=document.getElementById("inM");
  const inS=document.getElementById("inS");
  const startBtn=document.getElementById("startBtn");
  const ringFill=document.getElementById("ringFill");
  const CIRC=2*Math.PI*237; // ~1489.4

  window.clampInput=(el,max)=>{let v=parseInt(el.value);if(isNaN(v))return;if(v<0)el.value=0;if(v>max)el.value=max;};
  const setStatus=t=>document.getElementById("statusLbl").textContent=t;

  const renderRing=()=>{
    const pct=total>0?(remaining/total):1;
    ringFill.style.strokeDashoffset=CIRC*(1-pct);
  };

  const setDisplayFromRemaining=()=>{
    inH.value=pad(Math.floor(remaining/3600));
    inM.value=pad(Math.floor((remaining%3600)/60));
    inS.value=pad(remaining%60);
  };

  const lockInputs=lock=>{inH.disabled=lock;inM.disabled=lock;inS.disabled=lock;};

  window.toggleTimer=()=>{
    if(done){resetTimer();return;}
    if(!running){
      const h=parseInt(inH.value)||0;
      const m=parseInt(inM.value)||0;
      const s=parseInt(inS.value)||0;
      const secs=h*3600+m*60+s;
      if(secs<=0)return;
      if(remaining===0||remaining===total){total=remaining=secs;}
      lockInputs(true);running=true;
      startBtn.textContent="⏸ Pause";
      setStatus("focus");renderRing();
      interval=setInterval(tick,1000);
    }else{
      clearInterval(interval);running=false;
      startBtn.textContent="▶ Resume";
      setStatus("paused");
    }
  };

  const tick=()=>{
    if(remaining<=0){finish();return;}
    remaining--;setDisplayFromRemaining();renderRing();
    if(remaining===0)finish();
  };

  const finish=()=>{
    clearInterval(interval);running=false;done=true;
    ringFill.style.strokeDashoffset=CIRC;
    ["boxH","boxM","boxS"].forEach(id=>document.getElementById(id).classList.add("done-pulse"));
    startBtn.textContent="↺ Restart";setStatus("🎉 time's up");
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [0,150,300].forEach(d=>{
        const osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);
        osc.frequency.value=880;osc.type="sine";
        g.gain.setValueAtTime(0.3,ctx.currentTime+d/1000);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d/1000+0.4);
        osc.start(ctx.currentTime+d/1000);osc.stop(ctx.currentTime+d/1000+0.4);
      });
    }catch(e){}
  };

  window.resetTimer=()=>{
    clearInterval(interval);running=false;done=false;total=0;remaining=0;
    ["boxH","boxM","boxS"].forEach(id=>document.getElementById(id).classList.remove("done-pulse"));
    lockInputs(false);inH.value="";inM.value="";inS.value="";
    startBtn.textContent="▶ Start";setStatus("ready");
    ringFill.style.strokeDashoffset=0;
  };

  window.addTime=secs=>{
    if(done)return;
    total+=secs;remaining+=secs;
    setDisplayFromRemaining();renderRing();
  };

  document.addEventListener("keydown",e=>{
    if(e.target.tagName==="INPUT")return;
    if(e.key===" "){e.preventDefault();toggleTimer();}
    if(e.key==="r"||e.key==="R")resetTimer();
  });
</script>
</body>
</html>
